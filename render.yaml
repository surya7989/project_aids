services:
  - type: web
    name: ai-ids
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RENDER
        value: "true"
      - key: VERCEL
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ids-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: VITE_API_URL
        value: /api/v1

databases:
  - name: ai-ids-db
    databaseName: aids_db
    user: aids
    plan: free
