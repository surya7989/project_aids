services:
  - type: web
    name: ai-ids
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: RENDER
        value: "true"
      - key: VERCEL
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ids-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json

databases:
  - name: ai-ids-db
    databaseName: aids_db
    user: aids
    plan: free
