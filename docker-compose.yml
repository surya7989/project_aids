services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aids
      POSTGRES_PASSWORD: aids_secret_2024
      POSTGRES_DB: aids_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aids -d aids_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aids:aids_secret_2024@db:5432/aids_db
      - POSTGRES_HOST=db
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=["*"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
