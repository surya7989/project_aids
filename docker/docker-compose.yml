version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aids-postgres
    environment:
      POSTGRES_USER: aids
      POSTGRES_PASSWORD: aids_secret_2024
      POSTGRES_DB: aids_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aids"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aids-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: aids-backend
    environment:
      - APP_NAME=AI-IDS
      - APP_VERSION=1.0.0
      - DEBUG=false
      - ENVIRONMENT=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aids
      - POSTGRES_PASSWORD=aids_secret_2024
      - POSTGRES_DB=aids_db
      - JWT_SECRET_KEY=change-this-to-a-very-long-secure-random-string
      - CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - CONFIDENCE_THRESHOLD=0.85
      - ENABLE_REALTIME_PREDICTION=true
      - ENABLE_NOTIFICATIONS=true
    ports:
      - "80:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - trained_models:/app/trained_models
    networks:
      - aids-network
    restart: unless-stopped

volumes:
  postgres_data:
  trained_models:

networks:
  aids-network:
    driver: bridge
